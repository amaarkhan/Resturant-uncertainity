name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restaurant_uncertainty
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d restaurant_uncertainty"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/restaurant_uncertainty?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/restaurant_uncertainty?schema=public
      JWT_SECRET: ci-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Sync Prisma schema
        run: npm run db:push

      - name: Seed demo data
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Deploy API to Staging
        run: |
          if [ -n "${{ secrets.API_STAGING_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.API_STAGING_DEPLOY_HOOK }}"
          else
            echo "API_STAGING_DEPLOY_HOOK not set; skipping."
          fi
      
      - name: Deploy Customer App to Staging
        run: |
          if [ -n "${{ secrets.CUSTOMER_STAGING_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.CUSTOMER_STAGING_DEPLOY_HOOK }}"
          else
            echo "CUSTOMER_STAGING_DEPLOY_HOOK not set; skipping."
          fi
        
      - name: Deploy Admin Panel to Staging
        run: |
          if [ -n "${{ secrets.ADMIN_STAGING_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.ADMIN_STAGING_DEPLOY_HOOK }}"
          else
            echo "ADMIN_STAGING_DEPLOY_HOOK not set; skipping."
          fi

      - name: Verify Staging Health
        run: |
          if [ -n "${{ secrets.API_STAGING_URL }}" ]; then
            echo "Waiting for deployment to spin up..."
            sleep 60
            echo "Checking health endpoint..."
            curl -f -s "${{ secrets.API_STAGING_URL }}/health" || exit 1
            echo "Health check passed!"
          else
            echo "API_STAGING_URL not set; skipping health check."
          fi

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Deploy API to Production
        run: |
          if [ -n "${{ secrets.API_PROD_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.API_PROD_DEPLOY_HOOK }}"
          else
            echo "API_PROD_DEPLOY_HOOK not set; skipping."
          fi
      
      - name: Deploy Customer App to Production
        run: |
          if [ -n "${{ secrets.CUSTOMER_PROD_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.CUSTOMER_PROD_DEPLOY_HOOK }}"
          else
            echo "CUSTOMER_PROD_DEPLOY_HOOK not set; skipping."
          fi
        
      - name: Deploy Admin Panel to Production
        run: |
          if [ -n "${{ secrets.ADMIN_PROD_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.ADMIN_PROD_DEPLOY_HOOK }}"
          else
            echo "ADMIN_PROD_DEPLOY_HOOK not set; skipping."
          fi

      - name: Verify Production Health
        run: |
          if [ -n "${{ secrets.API_PROD_URL }}" ]; then
            echo "Waiting for deployment to spin up..."
            sleep 60
            echo "Checking health endpoint..."
            curl -f -s "${{ secrets.API_PROD_URL }}/health" || exit 1
            echo "Health check passed!"
          else
            echo "API_PROD_URL not set; skipping health check."
          fi
