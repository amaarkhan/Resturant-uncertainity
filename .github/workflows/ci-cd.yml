name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      JWT_SECRET: ci-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run Prisma migration
        run: npm run db:migrate

      - name: Seed demo data
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Deploy API to Staging
        if: secrets.API_STAGING_DEPLOY_HOOK != ''
        run: curl -X POST "${{ secrets.API_STAGING_DEPLOY_HOOK }}"
      
      - name: Deploy Customer App to Staging
        if: secrets.CUSTOMER_STAGING_DEPLOY_HOOK != ''
        run: curl -X POST "${{ secrets.CUSTOMER_STAGING_DEPLOY_HOOK }}"
        
      - name: Deploy Admin Panel to Staging
        if: secrets.ADMIN_STAGING_DEPLOY_HOOK != ''
        run: curl -X POST "${{ secrets.ADMIN_STAGING_DEPLOY_HOOK }}"

      - name: Verify Staging Health
        if: secrets.API_STAGING_URL != ''
        run: |
          echo "Waiting for deployment to spin up..."
          sleep 60
          echo "Checking health endpoint..."
          curl -f -s "${{ secrets.API_STAGING_URL }}/health" || exit 1
          echo "Health check passed!"

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ secrets.CUSTOMER_PROD_URL }}
    steps:
      - name: Deploy API to Production
        if: secrets.API_PROD_DEPLOY_HOOK != ''
        run: curl -X POST "${{ secrets.API_PROD_DEPLOY_HOOK }}"
      
      - name: Deploy Customer App to Production
        if: secrets.CUSTOMER_PROD_DEPLOY_HOOK != ''
        run: curl -X POST "${{ secrets.CUSTOMER_PROD_DEPLOY_HOOK }}"
        
      - name: Deploy Admin Panel to Production
        if: secrets.ADMIN_PROD_DEPLOY_HOOK != ''
        run: curl -X POST "${{ secrets.ADMIN_PROD_DEPLOY_HOOK }}"

      - name: Verify Production Health
        if: secrets.API_PROD_URL != ''
        run: |
          echo "Waiting for deployment to spin up..."
          sleep 60
          echo "Checking health endpoint..."
          curl -f -s "${{ secrets.API_PROD_URL }}/health" || exit 1
          echo "Health check passed!"
