services:
  - type: web
    name: restaurant-uncertainty-api
    runtime: node
    rootDir: services/api
    buildCommand: npm install && npm run db:generate
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000

  - type: web
    name: restaurant-uncertainty-customer
    runtime: static
    rootDir: apps/customer-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://restaurant-uncertainty-api.onrender.com

  - type: web
    name: restaurant-uncertainty-admin
    runtime: static
    rootDir: apps/admin-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://restaurant-uncertainty-api.onrender.com
